[config]
default_to_workspace = false

[tasks.help]
description = "Show available tasks"
script = '''
echo "MQDB Makefile Commands"
echo "======================"
echo ""
echo "Development:"
echo "  cargo make format        Format all code"
echo "  cargo make format-check  Check formatting (CI)"
echo "  cargo make check         Quick compilation check"
echo "  cargo make clippy        Lint with pedantic warnings"
echo "  cargo make dev           Format + clippy + test"
echo "  cargo make watch         Watch mode for check"
echo ""
echo "Building:"
echo "  cargo make build         Build all targets (debug)"
echo "  cargo make build-release Build release binary"
echo "  cargo make build-dist    Build size-optimized dist binary"
echo "  cargo make install       Install mqdb binary from local codebase"
echo "  cargo make build-profiling Build with profiling profile"
echo "  cargo make wasm-build    Build WASM package (pkg/)"
echo ""
echo "Testing:"
echo "  cargo make test          Run all tests"
echo "  cargo make test-verbose  Run tests with output"
echo "  cargo make ci            CI pipeline (format-check + clippy + test)"
echo ""
echo "WASM:"
echo "  cargo make wasm-build    Build WASM package (pkg/)"
echo "  cargo make wasm-test     Run WASM tests (Node.js)"
echo "  cargo make ci-wasm       WASM CI (build + test)"
echo ""
echo "Cleanup:"
echo "  cargo make clean         Clean build artifacts"
'''

[tasks.format]
description = "Format all crates"
dependencies = ["format-native", "format-wasm"]

[tasks.format-native]
description = "Format native crate"
command = "cargo"
args = ["fmt", "--all"]

[tasks.format-wasm]
description = "Format WASM crate"
command = "cargo"
args = ["fmt", "--manifest-path", "crates/mqdb-wasm/Cargo.toml"]

[tasks.format-check]
description = "Check formatting (CI)"
dependencies = ["format-check-native", "format-check-wasm"]

[tasks.format-check-native]
description = "Check native formatting"
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.format-check-wasm]
description = "Check WASM formatting"
command = "cargo"
args = ["fmt", "--manifest-path", "crates/mqdb-wasm/Cargo.toml", "--check"]

[tasks.check]
description = "Quick compilation check"
command = "cargo"
args = ["check", "--all-targets", "--all-features"]

[tasks.build]
description = "Build all targets (debug)"
command = "cargo"
args = ["build", "--all-targets"]

[tasks.build-release]
description = "Build release binary"
command = "cargo"
args = ["build", "--release"]

[tasks.install]
description = "Install mqdb binary from local codebase"
command = "cargo"
args = ["install", "--path", "."]

[tasks.clippy]
description = "Lint all crates with pedantic warnings"
dependencies = ["clippy-native", "clippy-wasm"]

[tasks.clippy-native]
description = "Lint native crate"
command = "cargo"
args = [
    "clippy",
    "--all-targets",
    "--all-features",
    "--",
    "-W", "clippy::pedantic",
]

[tasks.clippy-wasm]
description = "Lint WASM crate"
command = "cargo"
args = [
    "clippy",
    "--target", "wasm32-unknown-unknown",
    "--manifest-path", "crates/mqdb-wasm/Cargo.toml",
    "--",
    "-W", "clippy::pedantic",
]

[tasks.test]
description = "Run all tests"
command = "cargo"
args = ["test", "--all-features"]

[tasks.test-verbose]
description = "Run tests with output"
command = "cargo"
args = ["test", "--all-features", "--", "--nocapture"]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.dev]
description = "Format + clippy + test"
dependencies = ["format", "clippy", "test"]

[tasks.ci]
description = "CI pipeline (format-check + clippy + test)"
dependencies = ["format-check", "clippy", "test"]

[tasks.watch]
description = "Watch mode for check"
command = "cargo"
args = ["watch", "-x", "check"]

[tasks.build-dist]
description = "Build size-optimized dist binary (lto + strip + abort + opt-z)"
command = "cargo"
args = ["build", "--profile=dist"]

[tasks.build-profiling]
description = "Build with profiling profile"
command = "cargo"
args = ["build", "--profile=profiling"]

[tasks.wasm-build]
description = "Build WASM package (pkg/)"
dependencies = ["wasm-compile", "wasm-bindgen", "wasm-opt"]

[tasks.wasm-compile]
description = "Compile WASM binary"
command = "cargo"
args = ["build", "--target", "wasm32-unknown-unknown", "--release", "--manifest-path", "crates/mqdb-wasm/Cargo.toml"]

[tasks.wasm-bindgen]
description = "Generate JS bindings"
command = "wasm-bindgen"
args = ["--target", "web", "--out-dir", "crates/mqdb-wasm/pkg", "crates/mqdb-wasm/target/wasm32-unknown-unknown/release/mqdb_wasm.wasm"]

[tasks.wasm-opt]
description = "Optimize WASM binary with wasm-opt (optional, skipped if not installed)"
script = '''
if command -v wasm-opt > /dev/null 2>&1; then
    echo "Running wasm-opt -O4 on mqdb_wasm_bg.wasm..."
    wasm-opt -O4 --enable-bulk-memory --enable-nontrapping-float-to-int -o crates/mqdb-wasm/pkg/mqdb_wasm_bg.wasm crates/mqdb-wasm/pkg/mqdb_wasm_bg.wasm
    echo "wasm-opt complete"
else
    echo "wasm-opt not found, skipping (install binaryen for smaller WASM binaries)"
fi
'''

[tasks.wasm-test]
description = "Run WASM tests in Node.js"
script = '''
cd crates/mqdb-wasm
wasm-pack test --node
'''

[tasks.ci-wasm]
description = "WASM CI: build + test"
dependencies = ["wasm-build", "wasm-test"]
