[package]
name = "mqdb"
version = "0.1.0"
edition = "2024"

[dependencies]
crc32fast = "1.5.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tracing = "0.1.41"
uuid = { version = "1.18.1", features = ["v4"] }

clap = { version = "4.5.53", features = ["derive", "env"], optional = true }
comfy-table = { version = "7.2.1", optional = true }
fjall = { version = "2.11.2", optional = true }
mqtt5 = { version = "0.12.0", path = "../mqtt-lib/crates/mqtt5", optional = true }
tokio = { version = "1.48.0", features = ["full"], optional = true }

[features]
default = ["native"]
native = ["dep:clap", "dep:comfy-table", "dep:fjall", "dep:mqtt5", "dep:tokio"]
opentelemetry = ["mqtt5/opentelemetry", "dep:opentelemetry", "dep:tracing-opentelemetry"]

[dependencies.opentelemetry]
version = "0.31"
optional = true
features = ["trace"]

[dependencies.tracing-opentelemetry]
version = "0.32"
optional = true

[[bin]]
name = "mqdb"
path = "src/bin/mqdb.rs"
required-features = ["native"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
uuid = { version = "1.18.1", features = ["v4", "js"] }

[dev-dependencies]
tempfile = "3.23.0"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
