[package]
name = "mqdb"
version = "0.1.0"
edition = "2024"

[dependencies]
crc32fast = "1.5.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tracing = "0.1.44"
uuid = { version = "1.19.0", features = ["v4", "v7"] }
bebytes = { version = "3.0.1", features = ["bytes"] }

clap = { version = "4.5.53", features = ["derive", "env"], optional = true }
comfy-table = { version = "7.2.1", optional = true }
fjall = { version = "2.11.2", optional = true }
mqtt5 = { path = "/Volumes/SanDisk 4TB/repos/mqtt-lib/crates/mqtt5", optional = true }
tokio = { version = "1.48.0", features = ["full"], optional = true }
tracing-subscriber = { version = "0.3.20", features = [
    "env-filter",
], optional = true }
glob = "0.3.3"

[features]
default = ["native"]
native = [
    "dep:clap",
    "dep:comfy-table",
    "dep:fjall",
    "dep:mqtt5",
    "dep:tokio",
    "dep:tracing-subscriber",
]
opentelemetry = [
    "mqtt5/opentelemetry",
    "dep:opentelemetry",
    "dep:tracing-opentelemetry",
]
tracing-subscriber = ["dep:tracing-subscriber"]

[dependencies.opentelemetry]
version = "0.31"
optional = true
features = ["trace"]

[dependencies.tracing-opentelemetry]
version = "0.32"
optional = true

[[bin]]
name = "mqdb"
path = "src/bin/mqdb.rs"
required-features = ["native"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
uuid = { version = "1.18.1", features = ["v4", "js"] }

[dev-dependencies]
tempfile = "3.23.0"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
