[package]
name = "mqdb"
version = "0.1.0"
edition = "2024"

[dependencies]
crc32fast = "1.5.0"
fjall = "2.11.2"
mqtt5 = { version = "0.10.0", path = "../mqtt-lib/crates/mqtt5" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
tracing = "0.1.41"
uuid = { version = "1.18.1", features = ["v4"] }

[features]
default = []
opentelemetry = ["mqtt5/opentelemetry", "dep:opentelemetry", "dep:tracing-opentelemetry"]

[dependencies.opentelemetry]
version = "0.31"
optional = true
features = ["trace"]

[dependencies.tracing-opentelemetry]
version = "0.32"
optional = true

[dev-dependencies]
tempfile = "3.23.0"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
