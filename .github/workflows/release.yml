name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CRATE_VERSION=$(grep '^version' crates/mqdb-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$CRATE_VERSION" ]; then
            echo "Tag v$TAG does not match mqdb-cli version $CRATE_VERSION"
            exit 1
          fi

      - name: Publish mqdb-core
        run: cargo publish --package mqdb-core || echo "already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish mqdb-agent
        run: cargo publish --package mqdb-agent || echo "already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Get WASM crate version
        id: wasm-version
        run: |
          VERSION=$(grep '^version' crates/mqdb-wasm/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if npm publish needed
        id: npm-check
        run: |
          NPM_VERSION=$(npm view mqdb-wasm version 2>/dev/null || echo "0.0.0")
          if [ "$NPM_VERSION" = "${{ steps.wasm-version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        if: steps.npm-check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        if: steps.npm-check.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        if: steps.npm-check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build WASM
        if: steps.npm-check.outputs.skip != 'true'
        run: cargo build --target wasm32-unknown-unknown --release --manifest-path crates/mqdb-wasm/Cargo.toml

      - name: Install matching wasm-bindgen-cli
        if: steps.npm-check.outputs.skip != 'true'
        run: |
          WB_VERSION=$(cargo metadata --manifest-path crates/mqdb-wasm/Cargo.toml --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print([p['version'] for p in pkgs if p['name']=='wasm-bindgen'][0])")
          cargo install wasm-bindgen-cli --version "$WB_VERSION"

      - name: Generate bindings
        if: steps.npm-check.outputs.skip != 'true'
        run: wasm-bindgen --target web --out-dir pkg crates/mqdb-wasm/target/wasm32-unknown-unknown/release/mqdb_wasm.wasm

      - name: Create package.json
        if: steps.npm-check.outputs.skip != 'true'
        run: |
          cat > pkg/package.json << 'PKGJSON'
          {
            "name": "mqdb-wasm",
            "version": "${{ steps.wasm-version.outputs.version }}",
            "description": "WASM client library for MQDB reactive database",
            "license": "AGPL-3.0-only",
            "repository": {
              "type": "git",
              "url": "https://github.com/LabOverWire/MQDB"
            },
            "files": [
              "mqdb_wasm_bg.wasm",
              "mqdb_wasm.js",
              "mqdb_wasm.d.ts"
            ],
            "main": "mqdb_wasm.js",
            "types": "mqdb_wasm.d.ts"
          }
          PKGJSON

      - name: Copy LICENSE
        if: steps.npm-check.outputs.skip != 'true'
        run: cp LICENSE pkg/

      - name: Publish to npm
        if: steps.npm-check.outputs.skip != 'true'
        working-directory: pkg
        run: npm pkg fix && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: mqdb-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: mqdb-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: mqdb-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: mqdb-windows-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --profile dist --package mqdb-cli --no-default-features --features http-api --target ${{ matrix.target }}

      - name: Prepare artifact (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/dist/mqdb ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Prepare artifact (windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\dist\mqdb.exe ${{ matrix.name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ runner.os == 'Windows' && format('{0}.exe', matrix.name) || matrix.name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, publish-npm, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          BODY=$(awk "/^## \[$TAG\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/mqdb-linux-amd64/mqdb-linux-amd64
            artifacts/mqdb-macos-amd64/mqdb-macos-amd64
            artifacts/mqdb-macos-arm64/mqdb-macos-arm64
            artifacts/mqdb-windows-amd64/mqdb-windows-amd64.exe
