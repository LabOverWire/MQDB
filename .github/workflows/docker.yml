name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: laboverwire/mqdb

jobs:
  docker:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: agent
            features: http-api,opentelemetry
            suffix: ""
          - variant: full
            features: cluster,http-api,opentelemetry
            suffix: "-full"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ matrix.suffix == '' && github.event_name == 'push' }},suffix=
            type=raw,value=full,enable=${{ matrix.suffix == '-full' && github.event_name == 'push' }},suffix=
            type=raw,value=dev,enable=${{ matrix.suffix == '' && github.event_name == 'workflow_dispatch' }},suffix=
            type=raw,value=dev-full,enable=${{ matrix.suffix == '-full' && github.event_name == 'workflow_dispatch' }},suffix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEATURES=${{ matrix.features }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
