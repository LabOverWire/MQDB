services:
  postgres:
    image: postgres:17
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: mqdb_bench
      POSTGRES_HOST_AUTH_METHOD: trust
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 3s
      retries: 10

  mosquitto:
    build:
      context: .
      dockerfile: Dockerfile.mosquitto
    ports: ["1884:1884"]
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-p", "1884", "-t", "$$SYS/#", "-C", "1", "-W", "1"]
      interval: 1s
      timeout: 3s
      retries: 10

  mosquitto-redis:
    build:
      context: .
      dockerfile: Dockerfile.mosquitto-redis
    ports: ["1885:1885"]
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-p", "1885", "-t", "$$SYS/#", "-C", "1", "-W", "1"]
      interval: 1s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10
