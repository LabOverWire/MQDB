[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
exceptions = [
    { allow = ["AGPL-3.0-only"], crate = "mqdb-core" },
    { allow = ["AGPL-3.0-only"], crate = "mqdb-agent" },
    { allow = ["AGPL-3.0-only"], crate = "mqdb-cluster" },
    { allow = ["AGPL-3.0-only"], crate = "mqdb-cli" },
    { allow = ["AGPL-3.0-only"], crate = "mqdb-wasm" },
]

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-git = ["https://github.com/LabOverWire/mqtt-lib"]
